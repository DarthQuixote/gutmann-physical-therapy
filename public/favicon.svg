<svg xmlns="http://www.w3.org/2000/svg" width="48" height="46" fill="none" viewBox="0 0 48 46">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap');
      .favicon-text {
        font-family: 'Poppins', sans-serif;
        font-weight: 700;
        font-size: 7px;
        letter-spacing: -0.3px;
        line-height: 1.2;
      }
    </style>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#863bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e14ff;stop-opacity:1" />
    </linearGradient>
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7.659"/>
    </filter>
    <filter id="blur2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4.596"/>
    </filter>
  </defs>
  
  <!-- Decorative background glow elements -->
  <ellipse cx="5.508" cy="14.704" fill="#ede6ff" rx="5.508" ry="14.704" style="fill:#ede6ff;fill-opacity:1" transform="matrix(.00324 1 1 -.00324 -4.47 31.516)" filter="url(#blur1)"/>
  
  <ellipse cx="10.399" cy="29.851" fill="#ede6ff" rx="10.399" ry="29.851" style="fill:#ede6ff;fill-opacity:1" transform="matrix(.00324 1 1 -.00324 -39.328 7.883)" filter="url(#blur2)"/>
  
  <!-- Main text: "Trident Physical Therapy" -->
  <text x="24" y="18" text-anchor="middle" class="favicon-text" fill="url(#textGrad)" style="fill:#863bff;font-size:6px;font-weight:700">
    TRIDENT
  </text>
  
  <text x="24" y="28" text-anchor="middle" class="favicon-text" fill="url(#textGrad)" style="fill:#7e14ff;font-size:5px;font-weight:700">
    PHYSICAL
  </text>
  
  <text x="24" y="37" text-anchor="middle" class="favicon-text" fill="url(#textGrad)" style="fill:#863bff;font-size:5px;font-weight:700">
    THERAPY
  </text>
  
  <!-- Accent circles for visual interest -->
  <circle cx="8" cy="12" r="0.8" fill="#47bfff" opacity="0.6"/>
  <circle cx="40" cy="10" r="0.8" fill="#47bfff" opacity="0.6"/>
  <circle cx="42" cy="38" r="0.8" fill="#7e14ff" opacity="0.5"/>
</svg>